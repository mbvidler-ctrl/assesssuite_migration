name: Production content-free referral diagnostic

on:
  push:
    branches:
      - diagnostic/ASX-INC-20260720-REFERRAL-02

permissions:
  contents: read

concurrency:
  group: assesssuite-production-content-free-diagnostic
  cancel-in-progress: false

jobs:
  diagnostic:
    name: Query the fixed content-free referral audit projection
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Validate trusted push context and bounded incident constants
        shell: bash
        env:
          EXPECTED_RELEASE_SHA: 183c8e47a0025ad311f5f6c1ea063c2feb430817
          WINDOW_START_UTC: '2026-07-20T08:35:00Z'
          WINDOW_END_UTC: '2026-07-20T09:30:00Z'
          INCIDENT_REFERENCE: ASX-INC-20260720-REFERRAL-02
          AUTHORITY_REFERENCE: MAXWELL-VIDLER-CHAT-20260720
          CONFIRMATION: DIAGNOSE assesssuite-production CONTENT-FREE
          EVENT_REF: ${{ github.ref }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          IS_FORK: ${{ github.event.repository.fork }}
        run: |
          set -euo pipefail
          [[ "$REPOSITORY" == "mbvidler-ctrl/assesssuite_migration" ]]
          [[ "$ACTOR" == "mbvidler-ctrl" ]]
          [[ "$IS_FORK" == "false" ]]
          [[ "$EVENT_REF" == "refs/heads/diagnostic/ASX-INC-20260720-REFERRAL-02" ]]
          [[ "$WORKFLOW_REF" == "mbvidler-ctrl/assesssuite_migration/.github/workflows/production-content-free-diagnostic.yml@refs/heads/diagnostic/ASX-INC-20260720-REFERRAL-02" ]]
          [[ "$CONFIRMATION" == "DIAGNOSE assesssuite-production CONTENT-FREE" ]]
          [[ "$EXPECTED_RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$WINDOW_START_UTC" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]]
          [[ "$WINDOW_END_UTC" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$ ]]
          [[ "$INCIDENT_REFERENCE" =~ ^[A-Za-z0-9._:-]{1,120}$ ]]
          [[ "$AUTHORITY_REFERENCE" =~ ^[A-Za-z0-9._:-]{1,120}$ ]]

          node --input-type=module <<'NODE'
          const start = Date.parse(process.env.WINDOW_START_UTC);
          const end = Date.parse(process.env.WINDOW_END_UTC);
          const now = Date.now();
          if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) process.exit(1);
          if (end - start > 4 * 60 * 60 * 1000) process.exit(1);
          if (start < now - 72 * 60 * 60 * 1000 || end > now + 5 * 60 * 1000) process.exit(1);
          NODE

      - name: Check out the reviewed diagnostic source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Verify the fixed diagnostic implementation and output firewall
        shell: bash
        run: |
          set -euo pipefail
          echo '2782a78808a5a6fdaae7cc6436789b4e3f2423e1d345d0a87f2b92e5c5f1cb53  scripts/production-content-free-diagnostic.mjs' | sha256sum --check --strict
          echo '8c2397d787f45ab293704237b1b4d252f04759fab6449f33d97824e081332c78  scripts/validate-production-content-free-diagnostic.mjs' | sha256sum --check --strict
          NODE_NO_WARNINGS=1 node --test server/tests/production-content-free-diagnostic.test.mjs

      - name: Verify the expected release is still served
        shell: bash
        env:
          EXPECTED_RELEASE_SHA: 183c8e47a0025ad311f5f6c1ea063c2feb430817
        run: |
          set -euo pipefail
          version_json="$RUNNER_TEMP/production-version.json"
          curl --fail --silent --show-error --max-time 15 \
            -H 'Cache-Control: no-cache' \
            'https://assesssuite-production.fly.dev/api/version' \
            --output "$version_json"
          jq -e --arg sha "$EXPECTED_RELEASE_SHA" \
            '.release_sha == $sha and (.build_timestamp | type == "string" and length > 0)' \
            "$version_json" >/dev/null

      - name: Install checksum-verified flyctl 0.4.71
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/flyctl_0.4.71_Linux_x86_64.tar.gz"
          bin_dir="$RUNNER_TEMP/flyctl-bin"
          curl --fail --location --silent --show-error \
            'https://github.com/superfly/flyctl/releases/download/v0.4.71/flyctl_0.4.71_Linux_x86_64.tar.gz' \
            --output "$archive"
          echo 'a782dceed173d215c000ab94e2b08623c22267edff6d90ebe3010b3f9b671dc2  '"$archive" | sha256sum --check --strict
          mkdir -p "$bin_dir"
          tar -xzf "$archive" -C "$bin_dir" flyctl
          chmod 0755 "$bin_dir/flyctl"
          ln -s "$bin_dir/flyctl" "$bin_dir/fly"
          echo "$bin_dir" >>"$GITHUB_PATH"
          "$bin_dir/flyctl" version | grep -F '0.4.71'

      - name: Run the read-only query and publish only validated fields
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          EXPECTED_RELEASE_SHA: 183c8e47a0025ad311f5f6c1ea063c2feb430817
          WINDOW_START_UTC: '2026-07-20T08:35:00Z'
          WINDOW_END_UTC: '2026-07-20T09:30:00Z'
          INCIDENT_REFERENCE: ASX-INC-20260720-REFERRAL-02
          AUTHORITY_REFERENCE: MAXWELL-VIDLER-CHAT-20260720
        run: |
          set -euo pipefail
          set +x
          app=assesssuite-production
          raw_output="$RUNNER_TEMP/diagnostic-raw.jsonl"
          command_stderr="$RUNNER_TEMP/diagnostic-command.stderr"
          safe_output="$RUNNER_TEMP/diagnostic-safe.json"
          diagnostic_b64="$(base64 -w 0 scripts/production-content-free-diagnostic.mjs)"
          remote_command="env NODE_NO_WARNINGS=1 ASSESSSUITE_CONTENT_FREE_DIAGNOSTIC_EXECUTE=1 ASSESSSUITE_DIAGNOSTIC_START_UTC=$WINDOW_START_UTC ASSESSSUITE_DIAGNOSTIC_END_UTC=$WINDOW_END_UTC ASSESSSUITE_DIAGNOSTIC_SCRIPT_B64=$diagnostic_b64 node --input-type=module --eval 'await import(\"data:text/javascript;base64,\" + process.env.ASSESSSUITE_DIAGNOSTIC_SCRIPT_B64)'"

          if ! fly ssh console \
            --app "$app" \
            --quiet \
            --pty=false \
            --command "$remote_command" \
            >"$raw_output" 2>"$command_stderr"; then
            echo '::error::The content-free production diagnostic failed; no remote output was published.'
            exit 1
          fi

          if ! node scripts/validate-production-content-free-diagnostic.mjs \
            "$raw_output" "$safe_output" "$WINDOW_START_UTC" "$WINDOW_END_UTC"; then
            echo '::error::The diagnostic output did not match the closed content-free contract; no remote output was published.'
            exit 1
          fi

          rm -f "$raw_output" "$command_stderr"
          echo 'CONTENT_FREE_DIAGNOSTIC_RESULT_BEGIN'
          cat "$safe_output"
          echo 'CONTENT_FREE_DIAGNOSTIC_RESULT_END'
          {
            echo '## AssessSuite content-free referral diagnostic'
            echo
            echo "- Workflow run: $GITHUB_RUN_ID"
            echo "- Incident reference: $INCIDENT_REFERENCE"
            echo "- Authority reference: $AUTHORITY_REFERENCE"
            echo "- Verified release SHA: $EXPECTED_RELEASE_SHA"
            echo
            echo '```json'
            cat "$safe_output"
            echo '```'
            echo
            echo 'No filenames, emails, patient or referral content, raw identifiers, raw logs, secrets, request bodies, provider bodies or arbitrary database fields were published. Internal user/organisation linkage is used only to derive the fixed preflight enum.'
          } >>"$GITHUB_STEP_SUMMARY"
