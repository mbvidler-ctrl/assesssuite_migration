name: Production rollback - verified compatibility image

on:
  workflow_dispatch:
    inputs:
      trusted_workflow_sha:
        description: Exact current main SHA supplying this trusted workflow
        required: true
        type: string
      failed_application_sha:
        description: Exact failed or suspect production application SHA
        required: true
        type: string
      expected_current_release:
        description: Current Fly release identifier recorded immediately before dispatch
        required: true
        type: string
      expected_current_image:
        description: Current full registry.fly.io/assesssuite-production image reference
        required: true
        type: string
      expected_machine_id:
        description: Exact sole production Fly Machine ID recorded immediately before dispatch
        required: true
        type: string
      expected_volume_id:
        description: Exact sole attached assesssuite_data Fly Volume ID recorded immediately before dispatch
        required: true
        type: string
      rollback_source_sha:
        description: Exact reviewed source SHA supplying fly.rollback.production.toml; must equal this workflow SHA and the remote main tip
        required: true
        type: string
      rollback_source_branch:
        description: Exact rollback source branch; must be main
        required: true
        type: string
      rollback_config_sha256:
        description: Reviewed SHA-256 of the exact fly.rollback.production.toml Git blob (LF bytes)
        required: true
        type: string
      rollback_image:
        description: Prebuilt and verified legal-version-compatible rollback image digest
        required: true
        type: string
      rollback_release_sha:
        description: Release SHA expected from /api/version after rollback
        required: true
        type: string
      capability_intent_id:
        description: Workspace OS rollback-intent ID with authorised and execution_ready decision
        required: true
        type: string
      authority_reference:
        description: Mission/order and approved rollback-intent reference
        required: true
        type: string
      incident_reference:
        description: Non-sensitive incident or failed workflow-run reference
        required: true
        type: string
      confirmation:
        description: Type ROLLBACK assesssuite-production COMPATIBILITY IMAGE
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: assesssuite-production
  cancel-in-progress: false

jobs:
  rollback:
    name: Roll back through the immutable compatibility image
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Validate trusted rollback dispatch and inputs
        shell: bash
        env:
          TRUSTED_WORKFLOW_SHA: ${{ inputs.trusted_workflow_sha }}
          FAILED_APPLICATION_SHA: ${{ inputs.failed_application_sha }}
          EXPECTED_CURRENT_RELEASE: ${{ inputs.expected_current_release }}
          EXPECTED_CURRENT_IMAGE: ${{ inputs.expected_current_image }}
          EXPECTED_MACHINE_ID: ${{ inputs.expected_machine_id }}
          EXPECTED_VOLUME_ID: ${{ inputs.expected_volume_id }}
          ROLLBACK_SOURCE_SHA: ${{ inputs.rollback_source_sha }}
          ROLLBACK_SOURCE_BRANCH: ${{ inputs.rollback_source_branch }}
          ROLLBACK_CONFIG_SHA256: ${{ inputs.rollback_config_sha256 }}
          ROLLBACK_IMAGE: ${{ inputs.rollback_image }}
          ROLLBACK_RELEASE_SHA: ${{ inputs.rollback_release_sha }}
          CAPABILITY_INTENT_ID: ${{ inputs.capability_intent_id }}
          AUTHORITY_REFERENCE: ${{ inputs.authority_reference }}
          INCIDENT_REFERENCE: ${{ inputs.incident_reference }}
          CONFIRMATION: ${{ inputs.confirmation }}
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          IS_FORK: ${{ github.event.repository.fork }}
        run: |
          set -euo pipefail
          [[ "$REPOSITORY" == "mbvidler-ctrl/assesssuite_migration" ]]
          [[ "$ACTOR" == "mbvidler-ctrl" ]]
          [[ "$TRIGGERING_ACTOR" == "mbvidler-ctrl" ]]
          [[ "$IS_FORK" == "false" ]]
          [[ "$EVENT_REF" == "refs/heads/main" ]]
          [[ "$WORKFLOW_REF" == "mbvidler-ctrl/assesssuite_migration/.github/workflows/production-rollback.yml@refs/heads/main" ]]
          [[ "$TRUSTED_WORKFLOW_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$WORKFLOW_SHA" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$EVENT_SHA" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$CONFIRMATION" == "ROLLBACK assesssuite-production COMPATIBILITY IMAGE" ]]
          [[ "$FAILED_APPLICATION_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$ROLLBACK_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$ROLLBACK_RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$ROLLBACK_RELEASE_SHA" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$ROLLBACK_SOURCE_BRANCH" =~ ^[A-Za-z0-9._/-]{1,180}$ ]]
          [[ "$ROLLBACK_SOURCE_BRANCH" != *".."* && "$ROLLBACK_SOURCE_BRANCH" != /* && "$ROLLBACK_SOURCE_BRANCH" != */ ]]
          git check-ref-format "refs/heads/$ROLLBACK_SOURCE_BRANCH"
          [[ "$ROLLBACK_SOURCE_BRANCH" == "main" ]]
          [[ "$ROLLBACK_SOURCE_SHA" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$FAILED_APPLICATION_SHA" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$ROLLBACK_CONFIG_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$EXPECTED_CURRENT_RELEASE" =~ ^v[1-9][0-9]*$ ]]
          [[ "$EXPECTED_CURRENT_IMAGE" =~ ^registry\.fly\.io/assesssuite-production(:[A-Za-z0-9._-]{1,128}|@sha256:[0-9a-f]{64})$ ]]
          [[ "$EXPECTED_MACHINE_ID" =~ ^[0-9a-f]{14,32}$ ]]
          [[ "$EXPECTED_VOLUME_ID" =~ ^vol_[A-Za-z0-9]+$ ]]
          [[ "$ROLLBACK_IMAGE" =~ ^registry\.fly\.io/assesssuite-production@sha256:[0-9a-f]{64}$ ]]
          [[ "$ROLLBACK_IMAGE" != "$EXPECTED_CURRENT_IMAGE" ]]
          [[ "$CAPABILITY_INTENT_ID" =~ ^[A-Za-z0-9._:-]{1,160}$ ]]
          [[ "$AUTHORITY_REFERENCE" =~ ^[A-Za-z0-9._:/-]{1,240}$ ]]
          [[ "$INCIDENT_REFERENCE" =~ ^[A-Za-z0-9._:/-]{1,240}$ ]]

      - name: Check out reviewed rollback configuration source only
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.rollback_source_sha }}
          path: rollback-source
          fetch-depth: 0
          persist-credentials: false

      - name: Verify rollback provenance and compatibility configuration
        shell: bash
        env:
          TRUSTED_WORKFLOW_SHA: ${{ inputs.trusted_workflow_sha }}
          ROLLBACK_SOURCE_SHA: ${{ inputs.rollback_source_sha }}
          ROLLBACK_SOURCE_BRANCH: ${{ inputs.rollback_source_branch }}
          ROLLBACK_CONFIG_SHA256: ${{ inputs.rollback_config_sha256 }}
        run: |
          set -euo pipefail
          source_dir=rollback-source
          config="$source_dir/fly.rollback.production.toml"
          [[ "$(git -C "$source_dir" rev-parse --verify 'HEAD^{commit}')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git -C "$source_dir" ls-remote --exit-code origin "refs/heads/$ROLLBACK_SOURCE_BRANCH" | awk 'NR == 1 { print $1 }')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git -C "$source_dir" ls-remote --exit-code origin refs/heads/main | awk 'NR == 1 { print $1 }')" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ -z "$(git -C "$source_dir" status --porcelain --untracked-files=no)" ]]
          [[ -f "$config" && ! -L "$config" ]]
          [[ -f "$source_dir/Dockerfile" && ! -L "$source_dir/Dockerfile" ]]
          [[ -f "$source_dir/server/productionBootstrap.mjs" && ! -L "$source_dir/server/productionBootstrap.mjs" ]]
          [[ "$(sha256sum "$config" | awk '{print $1}')" == "$ROLLBACK_CONFIG_SHA256" ]]
          [[ "$(grep -Ec '^app = "assesssuite-production"$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^primary_region = "syd"$' "$config")" -eq 1 ]]
          [[ "$(grep -Fxc '  app = "node server/productionBootstrap.mjs && exec node server/index.mjs"' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  source = "assesssuite_data"$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  destination = "/app/server/data"$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  snapshot_retention = 5$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  scheduled_snapshots = true$' "$config")" -eq 1 ]]
          [[ "$(grep -Fxc '  UPLOAD_AUDIT_RETENTION_DAYS = "730"' "$config")" -eq 1 ]]
          [[ "$(grep -Fxc '  UPLOAD_CLEANUP_INTERVAL_MINUTES = "1"' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^\[\[vm\]\]$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  memory = "512mb"$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  cpus = 1$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  min_machines_running = 1$' "$config")" -eq 1 ]]
          if grep -EIn 'FLY_API_TOKEN|\$\{?FLY_|\[\[[^]]*files[^]]*\]\]|\[[^]]*experimental[^]]*\]|local_path|secret_name|raw_value|release_command|^[[:space:]]*\[build\.(args|secrets)\]|build[_-]secret|file[_-]secret|type[[:space:]]*=[[:space:]]*secret|--secret' \
            "$config" "$source_dir/Dockerfile"; then
            echo 'Rollback configuration contains a forbidden credential, local-file injection, build secret, or release hook.' >&2
            exit 1
          fi
          if grep -EIn '(^|[[:space:]/])(server/)?seed\.mjs([[:space:]&;]|$)|npm[[:space:]]+run[[:space:]]+seed|synthetic data reseeds on every boot' "$source_dir/Dockerfile"; then
            echo 'Rollback Docker startup must not invoke the full synthetic seed.' >&2
            exit 1
          fi
          if grep -Eq '^[[:space:]]*DOCUMENT_EXTRACTION(_UNDER_13)?_ENABLED[[:space:]]*=[[:space:]]*"1"[[:space:]]*$' "$config"; then
            echo 'Rollback configuration must keep adult and under-age document extraction disabled.' >&2
            exit 1
          fi
          [[ "$(grep -Ec '^[[:space:]]*GENERAL_CLINICAL_LLM_ENABLED[[:space:]]*=[[:space:]]*"0"[[:space:]]*$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^[[:space:]]*TRANSCRIPTION_ENABLED[[:space:]]*=[[:space:]]*"0"[[:space:]]*$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^[[:space:]]*LEGAL_STATUS[[:space:]]*=[[:space:]]*"effective"[[:space:]]*$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^[[:space:]]*LEGAL_EFFECTIVE_DATE[[:space:]]*=[[:space:]]*"19 July 2026"[[:space:]]*$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^[[:space:]]*LEGAL_COMPATIBILITY_ACCEPTED_VERSIONS[[:space:]]*=[[:space:]]*"RC-2026.07.11,RC-2026.07.19"[[:space:]]*$' "$config")" -eq 1 ]]

      - name: Set up Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Validate exact trusted release controls
        shell: bash
        env:
          TRUSTED_WORKFLOW_SHA: ${{ inputs.trusted_workflow_sha }}
          EXPECTED_TRUSTED_VALIDATOR_SHA256: 63cb8f9a37bed7f8d99aa65a12e5d7efbeb36f838429b829a981dde2dab6c9f5
        run: |
          set -euo pipefail
          trusted_dir="$RUNNER_TEMP/trusted-production-control"
          cleanup() {
            git -C rollback-source worktree remove --force "$trusted_dir" 2>/dev/null || true
          }
          trap cleanup EXIT
          git -C rollback-source worktree add --detach "$trusted_dir" "$TRUSTED_WORKFLOW_SHA"
          echo "$EXPECTED_TRUSTED_VALIDATOR_SHA256  scripts/validate-production-deploy-workflow.mjs" \
            | (cd "$trusted_dir" && sha256sum --check --strict)
          for workflow in \
            production-deploy.yml \
            production-prepare-release.yml \
            production-prepare-rollback-image.yml \
            production-rollback.yml \
            production-parity-assurance.yml; do
            node "$trusted_dir/scripts/validate-production-deploy-workflow.mjs" \
              "$trusted_dir/.github/workflows/$workflow"
            node "$trusted_dir/scripts/validate-production-deploy-workflow.mjs" \
              "$trusted_dir/.github/workflows/$workflow" --selftest
          done

      - name: Install checksum-verified flyctl 0.4.71
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/flyctl_0.4.71_Linux_x86_64.tar.gz"
          bin_dir="$RUNNER_TEMP/flyctl-bin"
          curl --fail --location --silent --show-error \
            'https://github.com/superfly/flyctl/releases/download/v0.4.71/flyctl_0.4.71_Linux_x86_64.tar.gz' \
            --output "$archive"
          echo 'a782dceed173d215c000ab94e2b08623c22267edff6d90ebe3010b3f9b671dc2  '"$archive" | sha256sum --check --strict
          mkdir -p "$bin_dir"
          tar -xzf "$archive" -C "$bin_dir" flyctl
          chmod 0755 "$bin_dir/flyctl"
          ln -s "$bin_dir/flyctl" "$bin_dir/fly"
          echo "$bin_dir" >>"$GITHUB_PATH"
          "$bin_dir/flyctl" version | grep -F '0.4.71'

      - name: Final secret-bearing immutable rollback and verification
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          TRUSTED_WORKFLOW_SHA: ${{ inputs.trusted_workflow_sha }}
          FAILED_APPLICATION_SHA: ${{ inputs.failed_application_sha }}
          EXPECTED_CURRENT_RELEASE: ${{ inputs.expected_current_release }}
          EXPECTED_CURRENT_IMAGE: ${{ inputs.expected_current_image }}
          EXPECTED_MACHINE_ID: ${{ inputs.expected_machine_id }}
          EXPECTED_VOLUME_ID: ${{ inputs.expected_volume_id }}
          ROLLBACK_SOURCE_SHA: ${{ inputs.rollback_source_sha }}
          ROLLBACK_SOURCE_BRANCH: ${{ inputs.rollback_source_branch }}
          ROLLBACK_CONFIG_SHA256: ${{ inputs.rollback_config_sha256 }}
          ROLLBACK_IMAGE: ${{ inputs.rollback_image }}
          ROLLBACK_RELEASE_SHA: ${{ inputs.rollback_release_sha }}
          CAPABILITY_INTENT_ID: ${{ inputs.capability_intent_id }}
          AUTHORITY_REFERENCE: ${{ inputs.authority_reference }}
          INCIDENT_REFERENCE: ${{ inputs.incident_reference }}
        run: |
          set -euo pipefail
          set +x
          app=assesssuite-production
          rollback_dir="$GITHUB_WORKSPACE/rollback-source"
          rollback_config="$rollback_dir/fly.rollback.production.toml"
          prior_json="$RUNNER_TEMP/prior-releases.json"
          new_json="$RUNNER_TEMP/rollback-releases.json"

          current_release() {
            env -u FLY_API_TOKEN node --input-type=module - "$1" <<'NODE'
          import fs from 'node:fs';
          const parsed = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const rows = Array.isArray(parsed) ? parsed : (parsed.releases || parsed.Releases || parsed.data || []);
          if (!Array.isArray(rows) || rows.length === 0) throw new Error('Fly returned no release rows');
          const status = (row) => String(row.Status ?? row.status ?? '').toLowerCase();
          const row = rows.find((item) => ['complete', 'completed', 'success', 'succeeded'].includes(status(item))) || rows[0];
          const rawId = row.Version ?? row.version ?? row.ID ?? row.id ?? row.ReleaseId ?? row.releaseId ?? row.release_id;
          const image = row.ImageRef ?? row.imageRef ?? row.image_ref ?? row.Image ?? row.image ?? row.DockerImage ?? row.docker_image;
          if (rawId === undefined || !image) throw new Error('Unrecognised Fly release shape');
          const id = /^\d+$/.test(String(rawId)) ? 'v' + rawId : String(rawId);
          process.stdout.write(id + '\t' + image);
          NODE
          }

          assert_topology() {
            local label=$1
            timeout --signal=TERM --kill-after=10s 60s fly machines list --app "$app" --json >"$RUNNER_TEMP/$label-machines.json"
            timeout --signal=TERM --kill-after=10s 60s fly volumes list --app "$app" --json >"$RUNNER_TEMP/$label-volumes.json"
            LABEL="$label" env -u FLY_API_TOKEN node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const root = process.env.RUNNER_TEMP;
          const label = process.env.LABEL;
          const machines = JSON.parse(fs.readFileSync(root + '/' + label + '-machines.json', 'utf8'));
          const volumes = JSON.parse(fs.readFileSync(root + '/' + label + '-volumes.json', 'utf8'));
          if (!Array.isArray(machines) || machines.length !== 1 || !Array.isArray(volumes) || volumes.length !== 1) {
            throw new Error('Expected exact one-machine/one-volume production topology');
          }
          const machine = machines[0];
          const volume = volumes[0];
          const guest = machine.config?.guest || machine.Config?.guest || {};
          if (machine.id !== process.env.EXPECTED_MACHINE_ID || !/^[0-9a-f]{14,32}$/.test(machine.id) ||
              (machine.region ?? machine.Region) !== 'syd' || Number(guest.cpus) !== 1 ||
              Number(guest.memory_mb ?? guest.memoryMb) !== 512 || (guest.cpu_kind ?? guest.cpuKind) !== 'shared') {
            throw new Error('Production machine identity or resources drifted');
          }
          if (volume.id !== process.env.EXPECTED_VOLUME_ID || volume.name !== 'assesssuite_data' ||
              volume.region !== 'syd' || volume.state !== 'created' || volume.size_gb !== 3 ||
              volume.encrypted !== true || volume.attached_machine_id !== machine.id ||
              volume.snapshot_retention !== 5 || volume.auto_backup_enabled !== true) {
            throw new Error('Production volume identity, attachment, encryption, or snapshot policy drifted');
          }
          const mounts = machine.config?.mounts;
          if (!Array.isArray(mounts) || mounts.length !== 1 || mounts[0]?.volume !== volume.id ||
              mounts[0]?.name !== volume.name || mounts[0]?.path !== '/app/server/data' ||
              mounts[0]?.encrypted !== true || mounts[0]?.size_gb !== 3) {
            throw new Error('Production data-volume mount drifted');
          }
          NODE
            rm -f "$RUNNER_TEMP/$label-machines.json" "$RUNNER_TEMP/$label-volumes.json"
          }

          assert_secret_name_boundary() {
            local label=$1
            local legacy_mode=$2
            local payload="$RUNNER_TEMP/$label-secret-names.json"
            timeout --signal=TERM --kill-after=10s 60s fly secrets list --app "$app" --json >"$payload"
            REQUIRED_NAMES_JSON="$payload" ROLLBACK_CONFIG="$rollback_config" LEGACY_MODE="$legacy_mode" \
              env -u FLY_API_TOKEN node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const rows = JSON.parse(fs.readFileSync(process.env.REQUIRED_NAMES_JSON, 'utf8'));
          if (!Array.isArray(rows) || rows.length === 0) throw new Error('Fly secret metadata is not a non-empty array');
          const names = [];
          for (const row of rows) {
            if (!row || typeof row !== 'object' || Array.isArray(row) ||
                Object.keys(row).some((key) => /^(?:value|raw_value|secret_value)$/i.test(key))) {
              throw new Error('Fly secret metadata is not names-only');
            }
            const name = row.Name ?? row.name;
            if (typeof name !== 'string' || !/^[A-Z][A-Z0-9_]{1,127}$/.test(name)) {
              throw new Error('Fly secret metadata contains an invalid name');
            }
            names.push(name);
          }
          if (new Set(names).size !== names.length) throw new Error('Fly secret metadata contains duplicate names');
          const present = new Set(names);
          const required = [
            'ADMIN_PASSWORD', 'APP_URL', 'RESEND_API_KEY', 'STRIPE_SECRET_KEY',
            'STRIPE_WEBHOOK_SECRET', 'STRIPE_PRICE_ID_MONTHLY', 'STRIPE_PRICE_ID_ANNUAL',
            'OPENAI_API_KEY',
          ];
          const missing = required.filter((name) => !present.has(name));
          if (missing.length) throw new Error('Required production secret name(s) absent: ' + missing.join(', '));
          const configText = fs.readFileSync(process.env.ROLLBACK_CONFIG, 'utf8').replaceAll('\r\n', '\n');
          const forbidden = new Set([
            'NODE_ENV', 'SELFTEST', 'RELEASE_SHA', 'SOURCE_BRANCH', 'BUILD_TIMESTAMP',
            'ASSESSSUITE_DB_PATH', 'ASSESSSUITE_DB_PATH_ACK',
            'DOCUMENT_EXTRACTION_TEST_BASE_URL', 'OPENAI_DOCUMENT_EXTRACTION_MODEL',
            'DOCUMENT_EXTRACTION_PROVIDER_PROBE', 'DOCUMENT_EXTRACTION_PROVIDER_PROBE_ACK',
            'ALLOW_PAID_PROVIDER_PROBE', 'RUN_DOCUMENT_EXTRACTION_PROVIDER_PROBE',
            'RUN_REFERRAL_PRODUCTION_CANARY', 'LEGAL_COMPATIBILITY_ACCEPTED_VERSIONS',
          ]);
          for (const match of configText.matchAll(/^\s{2}([A-Z][A-Z0-9_]*)\s*=/gm)) forbidden.add(match[1]);
          if (process.env.LEGACY_MODE === 'allow') {
            forbidden.delete('LEGAL_STATUS');
            forbidden.delete('LEGAL_EFFECTIVE_DATE');
          } else if (process.env.LEGACY_MODE !== 'forbid') {
            throw new Error('Secret-boundary legacy mode is invalid');
          }
          const opaqueOverrides = [...forbidden].filter((name) => present.has(name)).sort();
          if (opaqueOverrides.length) throw new Error('Forbidden opaque production secret name(s) present: ' + opaqueOverrides.join(', '));
          NODE
          }

          read_version() {
            local url=$1
            local body=$2
            for attempt in $(seq 1 20); do
              if curl --fail --silent --show-error --max-time 10 \
                -H 'Cache-Control: no-cache' "$url/api/version" -o "$body" \
                && jq -e --arg sha "$ROLLBACK_RELEASE_SHA" \
                  '.release_sha == $sha and (.build_timestamp | type == "string" and length > 0)' "$body" >/dev/null; then
                return 0
              fi
              sleep 3
            done
            return 1
          }

          read_public_settings() {
            local url=$1
            local body=$2
            curl --fail --silent --show-error --max-time 10 \
              -H 'Cache-Control: no-cache' \
              "$url/api/apps/public/prod/public-settings/by-id/rollback-verification" \
              -o "$body"
            jq -e \
              '.public_settings.legal.status == "effective" and .public_settings.legal.effective_date == "19 July 2026"' \
              "$body" >/dev/null
          }

          read_public_surface() {
            local url=$1
            local label=$2
            local html="$RUNNER_TEMP/$label-index.html"
            local bundle="$RUNNER_TEMP/$label-bundle.js"
            curl --fail --silent --show-error --max-time 15 -H 'Cache-Control: no-cache' "$url/" -o "$html" || return 1
            local asset_path
            asset_path="$(HTML_PATH="$html" env -u FLY_API_TOKEN node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const html = fs.readFileSync(process.env.HTML_PATH, 'utf8');
          const match = html.match(/<script[^>]+type=["']module["'][^>]+src=["']([^"']+)["']/i)
            || html.match(/<script[^>]+src=["']([^"']+)["'][^>]+type=["']module["']/i);
          if (!match || !match[1].startsWith('/assets/')) throw new Error('Production HTML did not reference a local module asset');
          process.stdout.write(match[1]);
          NODE
            )" || return 1
            curl --fail --silent --show-error --max-time 20 -H 'Cache-Control: no-cache' "$url$asset_path" -o "$bundle" || return 1
            BUNDLE_PATH="$bundle" env -u FLY_API_TOKEN node --input-type=module <<'NODE' || return 1
          import fs from 'node:fs';
          const bundle = fs.readFileSync(process.env.BUNDLE_PATH, 'utf8');
          if (bundle.length < 10_000) throw new Error('Production JavaScript bundle is incomplete');
          for (const required of [
            'I have read and agree to the',
            'Optional: send me product updates and marketing by email',
            'Accredited Exercise Physiologist (AEP)',
          ]) {
            if (!bundle.includes(required)) throw new Error('Production bundle is missing required signup wording: ' + required);
          }
          for (const forbidden of [
            'Country of Practice',
            "I confirm this practice's use of AssessSuite is limited to adult patients",
            'adult patients (18 and over)',
          ]) {
            if (bundle.toLowerCase().includes(forbidden.toLowerCase())) {
              throw new Error('Production bundle retains forbidden signup wording: ' + forbidden);
            }
          }
          NODE
            local status
            status="$(curl --silent --show-error --max-time 10 -o "$RUNNER_TEMP/$label-register-invalid.json" -w '%{http_code}' \
              -H 'Content-Type: application/json' -X POST --data '{}' "$url/api/apps/prod/auth/register")" || return 1
            [[ "$status" == '400' ]] || return 1
            status="$(curl --silent --show-error --max-time 10 -o "$RUNNER_TEMP/$label-anonymous-upload.json" -w '%{http_code}' \
              -X POST "$url/api/apps/prod/integration-endpoints/Core/UploadFile")" || return 1
            [[ "$status" == '401' ]] || return 1
            status="$(curl --silent --show-error --max-time 10 -o "$RUNNER_TEMP/$label-anonymous-extraction.json" -w '%{http_code}' \
              -H 'Content-Type: application/json' -X POST --data '{}' \
              "$url/api/apps/prod/integration-endpoints/Core/ExtractDataFromUploadedFile")" || return 1
            [[ "$status" == '401' ]] || return 1
            status="$(curl --silent --show-error --max-time 10 -o "$RUNNER_TEMP/$label-anonymous-file.json" -w '%{http_code}' \
              "$url/uploads/00000000-0000-4000-8000-000000000000")" || return 1
            [[ "$status" == '401' ]] || return 1
          }

          write_summary() {
            {
              echo '## AssessSuite production rollback'
              echo
              echo "- Workflow run: $GITHUB_RUN_ID"
              echo "- Capability intent: $CAPABILITY_INTENT_ID"
              echo "- Authority: $AUTHORITY_REFERENCE"
              echo "- Incident: $INCIDENT_REFERENCE"
              echo "- Trusted workflow SHA: $TRUSTED_WORKFLOW_SHA"
              echo "- Failed/suspect SHA: $FAILED_APPLICATION_SHA"
              echo "- Rollback source SHA: $ROLLBACK_SOURCE_SHA"
              echo "- Rollback Fly config SHA-256: $ROLLBACK_CONFIG_SHA256"
              echo "- Prior release: ${prior_release:-not-established}"
              echo "- Prior image: ${prior_image:-not-established}"
              echo "- Rollback release: ${rollback_release:-not-established}"
              echo "- Rollback image: ${rollback_image_actual:-$ROLLBACK_IMAGE}"
              echo '- Rollback proof: registering state; exact 39-field per-file schema and merge; age quarantine; referral_commit_receipt replay'
              echo "- Production topology: machine_id=$EXPECTED_MACHINE_ID; volume_id=$EXPECTED_VOLUME_ID; encrypted=true; scheduled_snapshots=true; snapshot_retention_days=5"
              echo "- Result: $1"
            } >> "$GITHUB_STEP_SUMMARY"
          }

          timeout --signal=TERM --kill-after=10s 60s fly auth docker
          timeout --signal=TERM --kill-after=30s 300s docker pull "$ROLLBACK_IMAGE"
          [[ "$(docker image inspect "$ROLLBACK_IMAGE" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(docker image inspect "$ROLLBACK_IMAGE" --format '{{ index .Config.Labels "io.assesssuite.trusted-workflow" }}')" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$(docker image inspect "$ROLLBACK_IMAGE" --format '{{ index .Config.Labels "io.assesssuite.rollback-proof" }}')" == 'registering-state+39-field-per-file-merge+age-quarantine+referral-commit-receipt-replay' ]]
          [[ "$(docker image inspect "$ROLLBACK_IMAGE" --format '{{json .Config.Entrypoint}}')" == '["docker-entrypoint.sh"]' ]]
          [[ "$(docker image inspect "$ROLLBACK_IMAGE" --format '{{json .Config.Cmd}}')" == '["sh","-c","node server/productionBootstrap.mjs && exec node server/index.mjs"]' ]]
          docker image inspect "$ROLLBACK_IMAGE" --format '{{ range .Config.Env }}{{ println . }}{{ end }}' >"$RUNNER_TEMP/rollback-image-env.txt"
          grep -Fx "RELEASE_SHA=$ROLLBACK_SOURCE_SHA" "$RUNNER_TEMP/rollback-image-env.txt"
          grep -Fx "SOURCE_BRANCH=$ROLLBACK_SOURCE_BRANCH" "$RUNNER_TEMP/rollback-image-env.txt"
          [[ "$(grep -Fxc 'NODE_ENV=production' "$RUNNER_TEMP/rollback-image-env.txt")" -eq 1 ]]
          if grep -Eq '^(SELFTEST|ASSESSSUITE_DB_PATH|ASSESSSUITE_DB_PATH_ACK|DOCUMENT_EXTRACTION_TEST_BASE_URL|DOCUMENT_EXTRACTION_PROVIDER_PROBE|DOCUMENT_EXTRACTION_PROVIDER_PROBE_ACK|ALLOW_PAID_PROVIDER_PROBE|RUN_DOCUMENT_EXTRACTION_PROVIDER_PROBE|RUN_REFERRAL_PRODUCTION_CANARY)=' "$RUNNER_TEMP/rollback-image-env.txt"; then
            echo 'Rollback image contains a forbidden test, database-override, or provider-probe environment variable.' >&2
            exit 1
          fi

          [[ "$(git -C "$rollback_dir" rev-parse --verify 'HEAD^{commit}')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git -C "$rollback_dir" ls-remote --exit-code origin "refs/heads/$ROLLBACK_SOURCE_BRANCH" | awk 'NR == 1 { print $1 }')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git -C "$rollback_dir" ls-remote --exit-code origin refs/heads/main | awk 'NR == 1 { print $1 }')" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$(sha256sum "$rollback_config" | awk '{print $1}')" == "$ROLLBACK_CONFIG_SHA256" ]]
          assert_topology prior
          timeout --signal=TERM --kill-after=10s 60s fly releases --app "$app" --image --json >"$prior_json"
          IFS=$'\t' read -r prior_release prior_image < <(current_release "$prior_json")
          [[ "$prior_release" == "$EXPECTED_CURRENT_RELEASE" ]]
          [[ "$prior_image" == "$EXPECTED_CURRENT_IMAGE" ]]
          assert_secret_name_boundary initial allow

          legacy_legal_secrets=()
          for name in LEGAL_STATUS LEGAL_EFFECTIVE_DATE; do
            if jq -e --arg name "$name" '.[] | select((.Name // .name) == $name)' "$RUNNER_TEMP/initial-secret-names.json" >/dev/null; then
              legacy_legal_secrets+=("$name")
            fi
          done
          if [[ "${#legacy_legal_secrets[@]}" -gt 0 ]]; then
            timeout --signal=TERM --kill-after=10s 60s fly secrets unset "${legacy_legal_secrets[@]}" --stage --app "$app"
          fi
          rm -f "$RUNNER_TEMP/initial-secret-names.json"

          # Final just-in-time freeze immediately before the sole application mutation.
          [[ "$(git -C "$rollback_dir" rev-parse --verify 'HEAD^{commit}')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git -C "$rollback_dir" ls-remote --exit-code origin "refs/heads/$ROLLBACK_SOURCE_BRANCH" | awk 'NR == 1 { print $1 }')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git -C "$rollback_dir" ls-remote --exit-code origin refs/heads/main | awk 'NR == 1 { print $1 }')" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$(sha256sum "$rollback_config" | awk '{print $1}')" == "$ROLLBACK_CONFIG_SHA256" ]]
          assert_topology final-predeploy
          final_prior_json="$RUNNER_TEMP/final-prior-releases.json"
          timeout --signal=TERM --kill-after=10s 60s fly releases --app "$app" --image --json >"$final_prior_json"
          IFS=$'\t' read -r final_prior_release final_prior_image < <(current_release "$final_prior_json")
          [[ "$final_prior_release" == "$EXPECTED_CURRENT_RELEASE" ]]
          [[ "$final_prior_image" == "$EXPECTED_CURRENT_IMAGE" ]]
          assert_secret_name_boundary final forbid
          rm -f "$RUNNER_TEMP/final-secret-names.json" "$final_prior_json"

          rollback_status=0
          timeout --signal=TERM --kill-after=30s 420s fly deploy "$rollback_dir" \
            --config "$rollback_config" \
            --strategy immediate \
            --ha=false \
            --update-only \
            --app "$app" \
            --image "$ROLLBACK_IMAGE" \
            --yes || rollback_status=$?
          if [[ "$rollback_status" -ne 0 ]]; then
            write_summary "ROLLBACK COMMAND FAILED (exit $rollback_status)"
            exit 1
          fi

          assert_topology rollback
          assert_secret_name_boundary postrollback forbid
          rm -f "$RUNNER_TEMP/postrollback-secret-names.json"
          timeout --signal=TERM --kill-after=10s 60s fly releases --app "$app" --image --json >"$new_json"
          IFS=$'\t' read -r rollback_release rollback_image_actual < <(current_release "$new_json")
          [[ "$rollback_image_actual" == "$ROLLBACK_IMAGE" ]]
          if ! read_version 'https://assesssuite.com' "$RUNNER_TEMP/rollback-apex-version.json" \
            || ! read_version 'https://assesssuite-production.fly.dev' "$RUNNER_TEMP/rollback-fly-version.json"; then
            write_summary 'ROLLBACK /api/version VERIFICATION FAILED'
            exit 1
          fi
          if ! read_public_settings 'https://assesssuite.com' "$RUNNER_TEMP/rollback-apex-public-settings.json" \
              || ! read_public_settings 'https://assesssuite-production.fly.dev' "$RUNNER_TEMP/rollback-fly-public-settings.json"; then
            write_summary 'ROLLBACK LEGAL SETTINGS VERIFICATION FAILED'
            exit 1
          fi
          if ! read_public_surface 'https://assesssuite.com' 'rollback-apex' \
              || ! read_public_surface 'https://assesssuite-production.fly.dev' 'rollback-fly'; then
            write_summary 'ROLLBACK PUBLIC SURFACE VERIFICATION FAILED'
            exit 1
          fi

          write_summary 'ROLLED BACK AND VERIFIED'
