name: Production rollback image - build only

on:
  workflow_dispatch:
    inputs:
      trusted_workflow_sha:
        description: Exact current main SHA supplying this trusted workflow
        required: true
        type: string
      rollback_source_sha:
        description: Exact reviewed compatibility source SHA; must equal this workflow SHA and the remote main tip
        required: true
        type: string
      rollback_config_sha256:
        description: Reviewed SHA-256 of the exact fly.rollback.production.toml Git blob (LF bytes)
        required: true
        type: string
      expected_current_release:
        description: Current Fly release identifier recorded immediately before dispatch
        required: true
        type: string
      expected_current_image:
        description: Current full registry.fly.io/assesssuite-production image reference
        required: true
        type: string
      expected_machine_id:
        description: Exact sole production Fly Machine ID recorded immediately before dispatch
        required: true
        type: string
      expected_volume_id:
        description: Exact sole attached assesssuite_data Fly Volume ID recorded immediately before dispatch
        required: true
        type: string
      rollback_source_branch:
        description: Exact compatibility source branch; must be main
        required: true
        type: string
      superseded_legal_version:
        description: Superseded legal-suite version accepted by the compatibility gate
        required: true
        type: string
      new_legal_version:
        description: New legal-suite version accepted by the compatibility gate
        required: true
        type: string
      capability_intent_id:
        description: Workspace OS build/push intent ID with authorised and execution_ready decision
        required: true
        type: string
      authority_reference:
        description: Mission/order and approved rollback-image intent reference
        required: true
        type: string
      confirmation:
        description: Type PREPARE assesssuite-production COMPATIBILITY IMAGE AND VOLUME POLICY
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: assesssuite-production
  cancel-in-progress: false

jobs:
  build_rollback_image:
    name: Gate and push compatibility image without deployment
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - name: Validate trusted dispatch context and inputs
        shell: bash
        env:
          TRUSTED_WORKFLOW_SHA: ${{ inputs.trusted_workflow_sha }}
          ROLLBACK_SOURCE_SHA: ${{ inputs.rollback_source_sha }}
          ROLLBACK_SOURCE_BRANCH: ${{ inputs.rollback_source_branch }}
          ROLLBACK_CONFIG_SHA256: ${{ inputs.rollback_config_sha256 }}
          EXPECTED_CURRENT_RELEASE: ${{ inputs.expected_current_release }}
          EXPECTED_CURRENT_IMAGE: ${{ inputs.expected_current_image }}
          EXPECTED_MACHINE_ID: ${{ inputs.expected_machine_id }}
          EXPECTED_VOLUME_ID: ${{ inputs.expected_volume_id }}
          SUPERSEDED_LEGAL_VERSION: ${{ inputs.superseded_legal_version }}
          NEW_LEGAL_VERSION: ${{ inputs.new_legal_version }}
          CAPABILITY_INTENT_ID: ${{ inputs.capability_intent_id }}
          AUTHORITY_REFERENCE: ${{ inputs.authority_reference }}
          CONFIRMATION: ${{ inputs.confirmation }}
          EVENT_REF: ${{ github.ref }}
          EVENT_SHA: ${{ github.sha }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          IS_FORK: ${{ github.event.repository.fork }}
        run: |
          set -euo pipefail
          [[ "$REPOSITORY" == "mbvidler-ctrl/assesssuite_migration" ]]
          [[ "$ACTOR" == "mbvidler-ctrl" ]]
          [[ "$TRIGGERING_ACTOR" == "mbvidler-ctrl" ]]
          [[ "$IS_FORK" == "false" ]]
          [[ "$EVENT_REF" == "refs/heads/main" ]]
          [[ "$WORKFLOW_REF" == "mbvidler-ctrl/assesssuite_migration/.github/workflows/production-prepare-rollback-image.yml@refs/heads/main" ]]
          [[ "$TRUSTED_WORKFLOW_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$WORKFLOW_SHA" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$EVENT_SHA" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$CONFIRMATION" == "PREPARE assesssuite-production COMPATIBILITY IMAGE AND VOLUME POLICY" ]]
          [[ "$ROLLBACK_SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$ROLLBACK_CONFIG_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$ROLLBACK_SOURCE_BRANCH" =~ ^[A-Za-z0-9._/-]{1,180}$ ]]
          [[ "$ROLLBACK_SOURCE_BRANCH" != *".."* && "$ROLLBACK_SOURCE_BRANCH" != /* && "$ROLLBACK_SOURCE_BRANCH" != */ ]]
          [[ "$EXPECTED_CURRENT_RELEASE" =~ ^v[1-9][0-9]*$ ]]
          [[ "$EXPECTED_CURRENT_IMAGE" =~ ^registry\.fly\.io/assesssuite-production(:[A-Za-z0-9._-]{1,128}|@sha256:[0-9a-f]{64})$ ]]
          [[ "$EXPECTED_MACHINE_ID" =~ ^[0-9a-f]{14,32}$ ]]
          [[ "$EXPECTED_VOLUME_ID" =~ ^vol_[A-Za-z0-9]+$ ]]
          [[ "$ROLLBACK_SOURCE_BRANCH" == "main" ]]
          [[ "$ROLLBACK_SOURCE_SHA" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$SUPERSEDED_LEGAL_VERSION" == "RC-2026.07.11" ]]
          [[ "$NEW_LEGAL_VERSION" == "RC-2026.07.19" ]]
          [[ "$SUPERSEDED_LEGAL_VERSION" != "$NEW_LEGAL_VERSION" ]]
          [[ "$CAPABILITY_INTENT_ID" =~ ^[A-Za-z0-9._:-]{1,160}$ ]]
          [[ "$AUTHORITY_REFERENCE" =~ ^[A-Za-z0-9._:/-]{1,240}$ ]]
          git check-ref-format "refs/heads/$ROLLBACK_SOURCE_BRANCH"

      - name: Check out exact compatibility source SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.rollback_source_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact rollback source and compatibility policy
        id: metadata
        shell: bash
        env:
          TRUSTED_WORKFLOW_SHA: ${{ inputs.trusted_workflow_sha }}
          ROLLBACK_SOURCE_SHA: ${{ inputs.rollback_source_sha }}
          ROLLBACK_SOURCE_BRANCH: ${{ inputs.rollback_source_branch }}
          ROLLBACK_CONFIG_SHA256: ${{ inputs.rollback_config_sha256 }}
        run: |
          set -euo pipefail
          config=fly.rollback.production.toml
          [[ "$(git rev-parse --verify 'HEAD^{commit}')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git ls-remote --exit-code origin "refs/heads/$ROLLBACK_SOURCE_BRANCH" | awk 'NR == 1 { print $1 }')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git ls-remote --exit-code origin refs/heads/main | awk 'NR == 1 { print $1 }')" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ -z "$(git status --porcelain --untracked-files=no)" ]]
          [[ -f "$config" && ! -L "$config" ]]
          [[ -f Dockerfile && ! -L Dockerfile ]]
          [[ -f server/productionBootstrap.mjs && ! -L server/productionBootstrap.mjs ]]
          [[ -f server/tests/production-startup.test.mjs && ! -L server/tests/production-startup.test.mjs ]]
          [[ -f server/tests/rollback-compatibility.test.mjs && ! -L server/tests/rollback-compatibility.test.mjs ]]
          [[ -f server/tests/forward-rollback-compatibility.test.mjs && ! -L server/tests/forward-rollback-compatibility.test.mjs ]]
          [[ "$(sha256sum "$config" | awk '{print $1}')" == "$ROLLBACK_CONFIG_SHA256" ]]
          [[ "$(grep -Ec '^app = "assesssuite-production"$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^primary_region = "syd"$' "$config")" -eq 1 ]]
          [[ "$(grep -Fxc '  app = "node server/productionBootstrap.mjs && exec node server/index.mjs"' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  source = "assesssuite_data"$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  destination = "/app/server/data"$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  snapshot_retention = 5$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  scheduled_snapshots = true$' "$config")" -eq 1 ]]
          [[ "$(grep -Fxc '  UPLOAD_AUDIT_RETENTION_DAYS = "730"' "$config")" -eq 1 ]]
          [[ "$(grep -Fxc '  UPLOAD_CLEANUP_INTERVAL_MINUTES = "1"' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^\[\[vm\]\]$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  memory = "512mb"$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  cpus = 1$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^  min_machines_running = 1$' "$config")" -eq 1 ]]
          if grep -EIn 'FLY_API_TOKEN|\$\{?FLY_|\[\[[^]]*files[^]]*\]\]|\[[^]]*experimental[^]]*\]|local_path|secret_name|raw_value|release_command|^[[:space:]]*\[build\.(args|secrets)\]|build[_-]secret|file[_-]secret|type[[:space:]]*=[[:space:]]*secret|--secret' \
            "$config" Dockerfile; then
            echo 'Compatibility build configuration contains a forbidden credential, local-file injection, build secret, or release hook.' >&2
            exit 1
          fi
          if grep -EIn '(^|[[:space:]/])(server/)?seed\.mjs([[:space:]&;]|$)|npm[[:space:]]+run[[:space:]]+seed|synthetic data reseeds on every boot' Dockerfile; then
            echo 'Compatibility Docker startup must not invoke the full synthetic seed.' >&2
            exit 1
          fi
          if grep -Eq '^[[:space:]]*DOCUMENT_EXTRACTION(_UNDER_13)?_ENABLED[[:space:]]*=[[:space:]]*"1"[[:space:]]*$' "$config"; then
            echo 'Compatibility image must keep adult and under-age document extraction disabled.' >&2
            exit 1
          fi
          [[ "$(grep -Ec '^[[:space:]]*GENERAL_CLINICAL_LLM_ENABLED[[:space:]]*=[[:space:]]*"0"[[:space:]]*$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^[[:space:]]*TRANSCRIPTION_ENABLED[[:space:]]*=[[:space:]]*"0"[[:space:]]*$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^[[:space:]]*LEGAL_STATUS[[:space:]]*=[[:space:]]*"effective"[[:space:]]*$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^[[:space:]]*LEGAL_EFFECTIVE_DATE[[:space:]]*=[[:space:]]*"19 July 2026"[[:space:]]*$' "$config")" -eq 1 ]]
          [[ "$(grep -Ec '^[[:space:]]*LEGAL_COMPATIBILITY_ACCEPTED_VERSIONS[[:space:]]*=[[:space:]]*"RC-2026.07.11,RC-2026.07.19"[[:space:]]*$' "$config")" -eq 1 ]]
          build_timestamp="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "build_timestamp=$build_timestamp" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Fail-closed dependency vulnerability audit
        run: npm audit --audit-level=moderate

      - name: Validate exact trusted release controls
        shell: bash
        env:
          TRUSTED_WORKFLOW_SHA: ${{ inputs.trusted_workflow_sha }}
          EXPECTED_TRUSTED_VALIDATOR_SHA256: dd11d92d8156e8b4a9e37cb37567e4a1972ed5575df50e6ffef6c943a8d7d70d
        run: |
          set -euo pipefail
          trusted_dir="$RUNNER_TEMP/trusted-production-control"
          cleanup() {
            git worktree remove --force "$trusted_dir" 2>/dev/null || true
          }
          trap cleanup EXIT
          git worktree add --detach "$trusted_dir" "$TRUSTED_WORKFLOW_SHA"
          echo "$EXPECTED_TRUSTED_VALIDATOR_SHA256  scripts/validate-production-deploy-workflow.mjs" \
            | (cd "$trusted_dir" && sha256sum --check --strict)
          for workflow in \
            production-deploy.yml \
            production-prepare-release.yml \
            production-prepare-rollback-image.yml \
            production-rollback.yml \
            production-parity-assurance.yml; do
            node "$trusted_dir/scripts/validate-production-deploy-workflow.mjs" \
              "$trusted_dir/.github/workflows/$workflow"
            node "$trusted_dir/scripts/validate-production-deploy-workflow.mjs" \
              "$trusted_dir/.github/workflows/$workflow" --selftest
          done

      - name: Require complete rollback proof contract
        shell: bash
        run: |
          set -euo pipefail
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import pkg from './package.json' with { type: 'json' };
          if (!pkg.scripts?.['test:rollback-compatibility']) {
            throw new Error('Required package script test:rollback-compatibility is absent');
          }
          if (!pkg.scripts?.['test:forward-rollback-compatibility']) {
            throw new Error('Required package script test:forward-rollback-compatibility is absent');
          }
          const source = fs.readFileSync('server/tests/forward-rollback-compatibility.test.mjs', 'utf8');
          for (const marker of [
            'ROLLBACK_PROOF_REGISTERING_STATE',
            'ROLLBACK_PROOF_39_FIELD_PER_FILE_MERGE',
            'ROLLBACK_PROOF_AGE_QUARANTINE',
            'ROLLBACK_PROOF_REFERRAL_COMMIT_RECEIPT_REPLAY',
          ]) {
            if (!source.includes(marker + '=PASS')) {
              throw new Error('Rollback compatibility proof marker absent: ' + marker);
            }
          }
          NODE

      - name: Build, typecheck differential, selftest, and rollback proof
        shell: bash
        env:
          SUPERSEDED_LEGAL_VERSION: ${{ inputs.superseded_legal_version }}
          NEW_LEGAL_VERSION: ${{ inputs.new_legal_version }}
          PRODUCTION_BASE_SHA: 183c8e47a0025ad311f5f6c1ea063c2feb430817
        run: |
          set -euo pipefail
          npm run build
          base_dir="$RUNNER_TEMP/typecheck-base"
          reference_dir="$RUNNER_TEMP/typecheck-reviewed-reference"
          git worktree add --detach "$base_dir" "$PRODUCTION_BASE_SHA"
          git worktree add --detach "$reference_dir" eae2f229886b8aa2071864767ba61c0d6e4a548d
          npm --prefix "$base_dir" ci
          npm --prefix "$reference_dir" ci
          node scripts/compare-typecheck-baseline.mjs \
            --base-dir "$base_dir" \
            --reference-dir "$reference_dir" \
            --candidate-dir "$GITHUB_WORKSPACE"
          npm run selftest
          node --test server/tests/production-startup.test.mjs
          npm run test:rollback-compatibility
          rollback_log="$RUNNER_TEMP/forward-rollback-proof.tap"
          npm run test:forward-rollback-compatibility >"$rollback_log"
          [[ "$(wc -c <"$rollback_log")" -le 524288 ]]
          for marker in \
            ROLLBACK_PROOF_REGISTERING_STATE \
            ROLLBACK_PROOF_39_FIELD_PER_FILE_MERGE \
            ROLLBACK_PROOF_AGE_QUARANTINE \
            ROLLBACK_PROOF_REFERRAL_COMMIT_RECEIPT_REPLAY; do
            [[ "$(grep -Fxc "# $marker=PASS" "$rollback_log")" -eq 1 ]]
          done
          rm -f "$rollback_log"

      - name: Lint only compatibility-source changes
        shell: bash
        env:
          PRODUCTION_BASE_SHA: 183c8e47a0025ad311f5f6c1ea063c2feb430817
        run: |
          set -euo pipefail
          git cat-file -e "$PRODUCTION_BASE_SHA^{commit}"
          mapfile -t lint_files < <(git diff --name-only --diff-filter=ACMR "$PRODUCTION_BASE_SHA" HEAD -- '*.js' '*.jsx' '*.mjs' '*.ts' '*.tsx')
          if [[ "${#lint_files[@]}" -gt 0 ]]; then
            npx --no-install eslint "${lint_files[@]}"
          fi

      - name: Secret scan and local image gate
        shell: bash
        env:
          TRUSTED_WORKFLOW_SHA: ${{ inputs.trusted_workflow_sha }}
          ROLLBACK_SOURCE_SHA: ${{ inputs.rollback_source_sha }}
          ROLLBACK_SOURCE_BRANCH: ${{ inputs.rollback_source_branch }}
          BUILD_TIMESTAMP: ${{ steps.metadata.outputs.build_timestamp }}
          PRODUCTION_BASE_SHA: 183c8e47a0025ad311f5f6c1ea063c2feb430817
          EXPECTED_RELEASE_SCANNER_SHA256: 1b34b794ab79f5ea022525f31bf70397c629ca0a16baf4320503c6cfdbd36c5c
        run: |
          set -euo pipefail
          changed_files="$(git diff --name-only "$PRODUCTION_BASE_SHA"...HEAD)"
          if grep -Eiq '(^|/)\.env($|\.(local|production|staging|development|test)$)|(^|/)(credentials?|secrets?)\.(json|txt|pem|key)$' <<<"$changed_files"; then
            printf '%s\n' "$changed_files"
            echo 'Compatibility diff contains a prohibited secret-bearing filename.' >&2
            exit 1
          fi
          git diff --binary "$PRODUCTION_BASE_SHA"...HEAD >"$RUNNER_TEMP/rollback.diff"
          [[ "$(sha256sum scripts/scan-release-diff.mjs | awk '{print $1}')" == "$EXPECTED_RELEASE_SCANNER_SHA256" ]]
          node scripts/scan-release-diff.mjs "$RUNNER_TEMP/rollback.diff"
          docker build \
            --build-arg "RELEASE_SHA=$ROLLBACK_SOURCE_SHA" \
            --build-arg "SOURCE_BRANCH=$ROLLBACK_SOURCE_BRANCH" \
            --build-arg "BUILD_TIMESTAMP=$BUILD_TIMESTAMP" \
            --label "org.opencontainers.image.revision=$ROLLBACK_SOURCE_SHA" \
            --label "org.opencontainers.image.created=$BUILD_TIMESTAMP" \
            --label "org.opencontainers.image.source=https://github.com/mbvidler-ctrl/assesssuite_migration/tree/$ROLLBACK_SOURCE_SHA" \
            --label "io.assesssuite.trusted-workflow=$TRUSTED_WORKFLOW_SHA" \
            --label 'io.assesssuite.rollback-proof=registering-state+39-field-per-file-merge+age-quarantine+referral-commit-receipt-replay' \
            --tag "assesssuite-rollback-gate:$ROLLBACK_SOURCE_SHA" \
            .
          image="assesssuite-rollback-gate:$ROLLBACK_SOURCE_SHA"
          [[ "$(docker image inspect "$image" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(docker image inspect "$image" --format '{{ index .Config.Labels "io.assesssuite.trusted-workflow" }}')" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$(docker image inspect "$image" --format '{{ index .Config.Labels "io.assesssuite.rollback-proof" }}')" == 'registering-state+39-field-per-file-merge+age-quarantine+referral-commit-receipt-replay' ]]
          [[ "$(docker image inspect "$image" --format '{{json .Config.Entrypoint}}')" == '["docker-entrypoint.sh"]' ]]
          [[ "$(docker image inspect "$image" --format '{{json .Config.Cmd}}')" == '["sh","-c","node server/productionBootstrap.mjs && exec node server/index.mjs"]' ]]
          docker image inspect "$image" --format '{{ range .Config.Env }}{{ println . }}{{ end }}' >"$RUNNER_TEMP/rollback-local-image-env.txt"
          grep -Fx "RELEASE_SHA=$ROLLBACK_SOURCE_SHA" "$RUNNER_TEMP/rollback-local-image-env.txt"
          grep -Fx "SOURCE_BRANCH=$ROLLBACK_SOURCE_BRANCH" "$RUNNER_TEMP/rollback-local-image-env.txt"
          [[ "$(grep -Fxc 'NODE_ENV=production' "$RUNNER_TEMP/rollback-local-image-env.txt")" -eq 1 ]]
          if grep -Eq '^(SELFTEST|ASSESSSUITE_DB_PATH|ASSESSSUITE_DB_PATH_ACK|DOCUMENT_EXTRACTION_TEST_BASE_URL|DOCUMENT_EXTRACTION_PROVIDER_PROBE|DOCUMENT_EXTRACTION_PROVIDER_PROBE_ACK|ALLOW_PAID_PROVIDER_PROBE|RUN_DOCUMENT_EXTRACTION_PROVIDER_PROBE|RUN_REFERRAL_PRODUCTION_CANARY)=' "$RUNNER_TEMP/rollback-local-image-env.txt"; then
            echo 'Compatibility image contains a forbidden test, database-override, or provider-probe environment variable.' >&2
            exit 1
          fi

      - name: Install checksum-verified flyctl 0.4.71
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/flyctl_0.4.71_Linux_x86_64.tar.gz"
          bin_dir="$RUNNER_TEMP/flyctl-bin"
          curl --fail --location --silent --show-error \
            'https://github.com/superfly/flyctl/releases/download/v0.4.71/flyctl_0.4.71_Linux_x86_64.tar.gz' \
            --output "$archive"
          echo 'a782dceed173d215c000ab94e2b08623c22267edff6d90ebe3010b3f9b671dc2  '"$archive" | sha256sum --check --strict
          mkdir -p "$bin_dir"
          tar -xzf "$archive" -C "$bin_dir" flyctl
          chmod 0755 "$bin_dir/flyctl"
          ln -s "$bin_dir/flyctl" "$bin_dir/fly"
          echo "$bin_dir" >>"$GITHUB_PATH"
          "$bin_dir/flyctl" version | grep -F '0.4.71'

      - name: Final secret-bearing compatibility image publication
        shell: bash
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          TRUSTED_WORKFLOW_SHA: ${{ inputs.trusted_workflow_sha }}
          ROLLBACK_SOURCE_SHA: ${{ inputs.rollback_source_sha }}
          ROLLBACK_SOURCE_BRANCH: ${{ inputs.rollback_source_branch }}
          ROLLBACK_CONFIG_SHA256: ${{ inputs.rollback_config_sha256 }}
          EXPECTED_CURRENT_RELEASE: ${{ inputs.expected_current_release }}
          EXPECTED_CURRENT_IMAGE: ${{ inputs.expected_current_image }}
          EXPECTED_MACHINE_ID: ${{ inputs.expected_machine_id }}
          EXPECTED_VOLUME_ID: ${{ inputs.expected_volume_id }}
          BUILD_TIMESTAMP: ${{ steps.metadata.outputs.build_timestamp }}
          SUPERSEDED_LEGAL_VERSION: ${{ inputs.superseded_legal_version }}
          NEW_LEGAL_VERSION: ${{ inputs.new_legal_version }}
          CAPABILITY_INTENT_ID: ${{ inputs.capability_intent_id }}
          AUTHORITY_REFERENCE: ${{ inputs.authority_reference }}
        run: |
          set -euo pipefail
          set +x
          app=assesssuite-production
          config="$GITHUB_WORKSPACE/fly.rollback.production.toml"
          image_tag="registry.fly.io/$app:rollback-compat-$ROLLBACK_SOURCE_SHA"

          current_release() {
            env -u FLY_API_TOKEN node --input-type=module - "$1" <<'NODE'
          import fs from 'node:fs';
          const parsed = JSON.parse(fs.readFileSync(process.argv[2], 'utf8'));
          const rows = Array.isArray(parsed) ? parsed : (parsed.releases || parsed.Releases || parsed.data || []);
          if (!Array.isArray(rows) || rows.length === 0) throw new Error('Fly returned no release rows');
          const status = (row) => String(row.Status ?? row.status ?? '').toLowerCase();
          const row = rows.find((item) => ['complete', 'completed', 'success', 'succeeded'].includes(status(item))) || rows[0];
          const rawId = row.Version ?? row.version ?? row.ID ?? row.id ?? row.ReleaseId ?? row.releaseId ?? row.release_id;
          const image = row.ImageRef ?? row.imageRef ?? row.image_ref ?? row.Image ?? row.image ?? row.DockerImage ?? row.docker_image;
          if (rawId === undefined || !image) throw new Error('Unrecognised Fly release shape');
          const id = /^\d+$/.test(String(rawId)) ? 'v' + rawId : String(rawId);
          process.stdout.write(id + '\t' + image);
          NODE
          }

          assert_topology() {
            local label=$1
            local snapshot_mode=$2
            timeout --signal=TERM --kill-after=10s 60s fly machines list --app "$app" --json >"$RUNNER_TEMP/$label-machines.json"
            timeout --signal=TERM --kill-after=10s 60s fly volumes list --app "$app" --json >"$RUNNER_TEMP/$label-volumes.json"
            LABEL="$label" SNAPSHOT_MODE="$snapshot_mode" env -u FLY_API_TOKEN node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const root = process.env.RUNNER_TEMP;
          const label = process.env.LABEL;
          const machines = JSON.parse(fs.readFileSync(root + '/' + label + '-machines.json', 'utf8'));
          const volumes = JSON.parse(fs.readFileSync(root + '/' + label + '-volumes.json', 'utf8'));
          if (!Array.isArray(machines) || machines.length !== 1 || !Array.isArray(volumes) || volumes.length !== 1) {
            throw new Error('Expected exact one-machine/one-volume production topology');
          }
          const machine = machines[0];
          const volume = volumes[0];
          const guest = machine.config?.guest || machine.Config?.guest || {};
          if (machine.id !== process.env.EXPECTED_MACHINE_ID || !/^[0-9a-f]{14,32}$/.test(machine.id) ||
              (machine.region ?? machine.Region) !== 'syd' || Number(guest.cpus) !== 1 ||
              Number(guest.memory_mb ?? guest.memoryMb) !== 512 || (guest.cpu_kind ?? guest.cpuKind) !== 'shared') {
            throw new Error('Production machine identity or resources drifted');
          }
          if (volume.id !== process.env.EXPECTED_VOLUME_ID || volume.name !== 'assesssuite_data' ||
              volume.region !== 'syd' || volume.state !== 'created' || volume.size_gb !== 3 ||
              volume.encrypted !== true || volume.attached_machine_id !== machine.id) {
            throw new Error('Production volume identity, attachment, or encryption drifted');
          }
          if (process.env.SNAPSHOT_MODE === 'exact') {
            if (volume.snapshot_retention !== 5 || volume.auto_backup_enabled !== true) {
              throw new Error('Production volume scheduled five-day snapshot policy drifted');
            }
          } else if (process.env.SNAPSHOT_MODE !== 'ignore') {
            throw new Error('Topology snapshot-policy mode is invalid');
          }
          const mounts = machine.config?.mounts;
          if (!Array.isArray(mounts) || mounts.length !== 1 || mounts[0]?.volume !== volume.id ||
              mounts[0]?.name !== volume.name || mounts[0]?.path !== '/app/server/data' ||
              mounts[0]?.encrypted !== true || mounts[0]?.size_gb !== 3) {
            throw new Error('Production data-volume mount drifted');
          }
          NODE
            rm -f "$RUNNER_TEMP/$label-machines.json" "$RUNNER_TEMP/$label-volumes.json"
          }

          enforce_volume_snapshot_policy() {
            local update_json="$RUNNER_TEMP/prepare-volume-policy-update.json"
            local update_stderr="$RUNNER_TEMP/prepare-volume-policy-update.stderr"
            local update_status=0
            set +e
            timeout --signal=TERM --kill-after=10s 60s fly volumes update "$EXPECTED_VOLUME_ID" \
              --app "$app" \
              --snapshot-retention 5 \
              --scheduled-snapshots=true \
              --json >"$update_json" 2>"$update_stderr"
            update_status=$?
            set -e
            if [[ "$update_status" -ne 0 || ! -s "$update_json" || -s "$update_stderr" \
              || "$(wc -c <"$update_json")" -gt 32768 \
              || "$(wc -c <"$update_stderr")" -gt 8192 ]]; then
              rm -f "$update_json" "$update_stderr"
              return 1
            fi
            if ! VOLUME_UPDATE_JSON="$update_json" env -u FLY_API_TOKEN node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const volume = JSON.parse(fs.readFileSync(process.env.VOLUME_UPDATE_JSON, 'utf8'));
          const requiredKeys = [
            'id', 'name', 'state', 'size_gb', 'region', 'zone', 'encrypted',
            'attached_machine_id', 'attached_alloc_id', 'created_at', 'host_dedication_id',
            'snapshot_retention', 'auto_backup_enabled',
          ];
          const allowedKeys = new Set([...requiredKeys, 'host_status']);
          if (!volume || typeof volume !== 'object' || Array.isArray(volume) ||
              requiredKeys.some((key) => !Object.hasOwn(volume, key)) ||
              Object.keys(volume).some((key) => !allowedKeys.has(key))) {
            throw new Error('Fly volume update response is outside the pinned v0.4.71 JSON contract');
          }
          if (volume.id !== process.env.EXPECTED_VOLUME_ID ||
              volume.attached_machine_id !== process.env.EXPECTED_MACHINE_ID ||
              volume.name !== 'assesssuite_data' || volume.state !== 'created' ||
              volume.region !== 'syd' || volume.size_gb !== 3 || volume.encrypted !== true ||
              volume.snapshot_retention !== 5 || volume.auto_backup_enabled !== true) {
            throw new Error('Fly volume update did not establish the exact encrypted five-day snapshot policy');
          }
          NODE
            then
              rm -f "$update_json" "$update_stderr"
              return 1
            fi
            rm -f "$update_json" "$update_stderr"
          }

          assert_secret_name_boundary() {
            local label=$1
            local legacy_mode=$2
            local payload="$RUNNER_TEMP/$label-secret-names.json"
            timeout --signal=TERM --kill-after=10s 60s fly secrets list --app "$app" --json >"$payload"
            REQUIRED_NAMES_JSON="$payload" ROLLBACK_CONFIG="$config" LEGACY_MODE="$legacy_mode" \
              env -u FLY_API_TOKEN node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const rows = JSON.parse(fs.readFileSync(process.env.REQUIRED_NAMES_JSON, 'utf8'));
          if (!Array.isArray(rows) || rows.length === 0) throw new Error('Fly secret metadata is not a non-empty array');
          const names = [];
          for (const row of rows) {
            if (!row || typeof row !== 'object' || Array.isArray(row) ||
                Object.keys(row).some((key) => /^(?:value|raw_value|secret_value)$/i.test(key))) {
              throw new Error('Fly secret metadata is not names-only');
            }
            const name = row.Name ?? row.name;
            if (typeof name !== 'string' || !/^[A-Z][A-Z0-9_]{1,127}$/.test(name)) {
              throw new Error('Fly secret metadata contains an invalid name');
            }
            names.push(name);
          }
          if (new Set(names).size !== names.length) throw new Error('Fly secret metadata contains duplicate names');
          const present = new Set(names);
          const required = [
            'ADMIN_PASSWORD', 'APP_URL', 'RESEND_API_KEY', 'STRIPE_SECRET_KEY',
            'STRIPE_WEBHOOK_SECRET', 'STRIPE_PRICE_ID_MONTHLY', 'STRIPE_PRICE_ID_ANNUAL',
            'OPENAI_API_KEY',
          ];
          const missing = required.filter((name) => !present.has(name));
          if (missing.length) throw new Error('Required production secret name(s) absent: ' + missing.join(', '));
          const configText = fs.readFileSync(process.env.ROLLBACK_CONFIG, 'utf8').replaceAll('\r\n', '\n');
          const forbidden = new Set([
            'NODE_ENV', 'SELFTEST', 'RELEASE_SHA', 'SOURCE_BRANCH', 'BUILD_TIMESTAMP',
            'ASSESSSUITE_DB_PATH', 'ASSESSSUITE_DB_PATH_ACK',
            'DOCUMENT_EXTRACTION_TEST_BASE_URL', 'OPENAI_DOCUMENT_EXTRACTION_MODEL',
            'DOCUMENT_EXTRACTION_PROVIDER_PROBE', 'DOCUMENT_EXTRACTION_PROVIDER_PROBE_ACK',
            'ALLOW_PAID_PROVIDER_PROBE', 'RUN_DOCUMENT_EXTRACTION_PROVIDER_PROBE',
            'RUN_REFERRAL_PRODUCTION_CANARY', 'LEGAL_STATUS', 'LEGAL_EFFECTIVE_DATE',
            'LEGAL_COMPATIBILITY_ACCEPTED_VERSIONS',
          ]);
          for (const match of configText.matchAll(/^\s{2}([A-Z][A-Z0-9_]*)\s*=/gm)) forbidden.add(match[1]);
          if (process.env.LEGACY_MODE === 'allow') {
            forbidden.delete('LEGAL_STATUS');
            forbidden.delete('LEGAL_EFFECTIVE_DATE');
          } else {
            throw new Error('Build-only secret-boundary legacy mode is invalid');
          }
          const opaqueOverrides = [...forbidden].filter((name) => present.has(name)).sort();
          if (opaqueOverrides.length) throw new Error('Forbidden opaque production secret name(s) present: ' + opaqueOverrides.join(', '));
          NODE
            rm -f "$payload"
          }

          timeout --signal=TERM --kill-after=10s 60s fly auth docker
          [[ "$(git rev-parse --verify 'HEAD^{commit}')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git ls-remote --exit-code origin "refs/heads/$ROLLBACK_SOURCE_BRANCH" | awk 'NR == 1 { print $1 }')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git ls-remote --exit-code origin refs/heads/main | awk 'NR == 1 { print $1 }')" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$(sha256sum "$config" | awk '{print $1}')" == "$ROLLBACK_CONFIG_SHA256" ]]
          assert_topology prepolicy ignore
          prior_json="$RUNNER_TEMP/prepublication-releases.json"
          timeout --signal=TERM --kill-after=10s 60s fly releases --app "$app" --image --json >"$prior_json"
          IFS=$'\t' read -r current_release_id current_image < <(current_release "$prior_json")
          [[ "$current_release_id" == "$EXPECTED_CURRENT_RELEASE" ]]
          [[ "$current_image" == "$EXPECTED_CURRENT_IMAGE" ]]
          assert_secret_name_boundary prepublication allow
          enforce_volume_snapshot_policy
          assert_topology prepublication exact

          docker tag "assesssuite-rollback-gate:$ROLLBACK_SOURCE_SHA" "$image_tag"
          push_output=''
          if ! push_output="$(timeout --signal=TERM --kill-after=30s 600s docker push "$image_tag" 2>&1)"; then
            unset push_output
            echo 'Compatibility image push failed; registry output withheld.' >&2
            exit 1
          fi
          image_digest="$(printf '%s\n' "$push_output" | sed -nE 's/^.*digest: (sha256:[0-9a-f]{64}) size: [0-9]+.*$/\1/p' | tail -n 1)"
          unset push_output
          [[ "$image_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          image_ref="registry.fly.io/$app@$image_digest"
          mapfile -t local_repo_digests < <(
            docker image inspect "$image_tag" --format '{{range .RepoDigests}}{{println .}}{{end}}' | sed '/^$/d'
          )
          [[ "${#local_repo_digests[@]}" -eq 1 ]]
          [[ "${local_repo_digests[0]}" == "$image_ref" ]]
          timeout --signal=TERM --kill-after=10s 60s docker buildx imagetools inspect "$image_ref" >/dev/null

          # Registry publication must not race an unreviewed production or source change.
          [[ "$(git ls-remote --exit-code origin "refs/heads/$ROLLBACK_SOURCE_BRANCH" | awk 'NR == 1 { print $1 }')" == "$ROLLBACK_SOURCE_SHA" ]]
          [[ "$(git ls-remote --exit-code origin refs/heads/main | awk 'NR == 1 { print $1 }')" == "$TRUSTED_WORKFLOW_SHA" ]]
          [[ "$(sha256sum "$config" | awk '{print $1}')" == "$ROLLBACK_CONFIG_SHA256" ]]
          assert_topology postpublication exact
          post_json="$RUNNER_TEMP/postpublication-releases.json"
          timeout --signal=TERM --kill-after=10s 60s fly releases --app "$app" --image --json >"$post_json"
          IFS=$'\t' read -r post_release post_image < <(current_release "$post_json")
          [[ "$post_release" == "$EXPECTED_CURRENT_RELEASE" ]]
          [[ "$post_image" == "$EXPECTED_CURRENT_IMAGE" ]]
          assert_secret_name_boundary postpublication allow

          {
            echo '## AssessSuite compatibility rollback image'
            echo
            echo "- Workflow run: $GITHUB_RUN_ID"
            echo "- Capability intent: $CAPABILITY_INTENT_ID"
            echo "- Authority: $AUTHORITY_REFERENCE"
            echo "- Trusted workflow SHA: $TRUSTED_WORKFLOW_SHA"
            echo "- Rollback source SHA: $ROLLBACK_SOURCE_SHA"
            echo "- Rollback source branch: $ROLLBACK_SOURCE_BRANCH"
            echo "- Rollback Fly config SHA-256: $ROLLBACK_CONFIG_SHA256"
            echo "- Build timestamp: $BUILD_TIMESTAMP"
            echo "- Superseded legal version accepted: $SUPERSEDED_LEGAL_VERSION"
            echo "- New legal version accepted: $NEW_LEGAL_VERSION"
            echo '- Rollback proof: registering state; exact 39-field per-file schema and merge; age quarantine; referral_commit_receipt replay'
            echo '- Document extraction in rollback runtime: disabled (adult and under-age)'
            echo "- Immutable rollback image: $image_ref"
            echo "- Production topology: machine_id=$EXPECTED_MACHINE_ID; volume_id=$EXPECTED_VOLUME_ID; encrypted=true; scheduled_snapshots=true; snapshot_retention_days=5"
            echo '- Production volume-policy mutation: exact five-day scheduled snapshots enforced and freshly verified'
            echo "- Current Fly release unchanged: $post_release"
            echo "- Current Fly image unchanged: $post_image"
            echo '- Production deployment performed: no'
          } >> "$GITHUB_STEP_SUMMARY"
